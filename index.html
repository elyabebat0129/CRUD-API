<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CRUD Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Gerenciar Usuários</h1>
        <div class="card p-4 mb-4">
            <h4>Novo usuário</h4>
            <input type="text" id="name" class="form-control mb-2" placeholder="Nome">
            <input type="number" id="age" class="form-control mb-2" placeholder="Idade">
            <input type="text" id="email" class="form-control mb-2" placeholder="Email">
            <button class="btn btn-primary" onclick="createUser()">Criar</button>
        </div>
        <div class="card p-4 mb-4" id="formEdit" style="display: none;">
            <h4>Editar Usuário</h4>
            <input type="hidden" id="editId">
            <input type="text" id="editName" class="form-control mb-2" placeholder="Nome">
            <input type="number" id="editAge" class="form-control mb-2" placeholder="Idade">
            <input type="text" id="editEmail" class="form-control mb-2" placeholder="Email">
            <button class="btn btn-warning" onclick="updateUser()">Criar</button>
        </div>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
